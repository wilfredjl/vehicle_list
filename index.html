<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Fleet Status Board</title>
      <link href=https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap rel="stylesheet">
      <style>
         :root {
         --bg: #0a0c0f;
         --surface: #111418;
         --surface2: #161b22;
         --border: #1e2329;
         --border-light: #2a3040;
         --standby: #00e5a0;
         --standby-dim: rgba(0,229,160,0.10);
         --onrun: #ff6b35;
         --onrun-dim: rgba(255,107,53,0.10);
         --longterm: #a78bfa;
         --longterm-dim: rgba(167,139,250,0.10);
         --nil: #3a3f4a;
         --nil-text: #555c6a;
         --text: #e8ecf2;
         --text-dim: #6b7585;
         --text-muted: #3d4555;
         --accent: #4a9eff;
         --servicing: #f59e0b;
         --workshop: #ef4444;
         --lowmanpower: #8b5cf6;
         --onloan: #06b6d4;
         --custom: #ec4899;
         }
         :root.light {
         --bg: #f0f2f5;
         --surface: #ffffff;
         --surface2: #f7f9fc;
         --border: #dde1e8;
         --border-light: #c8cdd8;
         --standby: #00a86b;
         --standby-dim: rgba(0,168,107,0.09);
         --onrun: #e85d20;
         --onrun-dim: rgba(232,93,32,0.09);
         --longterm: #7c3aed;
         --longterm-dim: rgba(124,58,237,0.09);
         --nil: #c8cdd8;
         --nil-text: #9aa0ae;
         --text: #161a22;
         --text-dim: #6b7585;
         --text-muted: #a0a8b8;
         --accent: #2070d8;
         --servicing: #d97706;
         --workshop: #dc2626;
         --lowmanpower: #7c3aed;
         --onloan: #0891b2;
         --custom: #db2777;
         }
         * { box-sizing: border-box; margin: 0; padding: 0; }
         body {
         background: var(--bg);
         color: var(--text);
         font-family: 'IBM Plex Mono', monospace;
         min-height: 100vh;
         padding: 28px 24px 80px;
         transition: background 0.25s, color 0.25s;
         }
         /* ── HEADER ── */
         header {
         max-width: 1200px;
         margin: 0 auto 28px;
         display: flex;
         align-items: center;
         gap: 16px;
         padding-bottom: 20px;
         border-bottom: 1px solid var(--border);
         }
         .header-left { flex: 1; }
         .header-left h1 {
         font-family: 'Syne', sans-serif;
         font-size: 26px;
         font-weight: 800;
         letter-spacing: -0.5px;
         color: var(--text);
         line-height: 1;
         margin-bottom: 4px;
         }
         .header-left p { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }
         .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
         .clock { font-size: 10px; color: var(--text-dim); text-align: right; letter-spacing: 0.05em; }
         .clock span { display: block; font-size: 18px; font-weight: 500; color: var(--text); letter-spacing: 0.08em; }
         /* ── HEADER CONTROLS ── */
         .ctrl-btn {
         background: var(--surface);
         border: 1px solid var(--border);
         border-radius: 8px;
         padding: 7px 12px;
         display: flex; align-items: center; gap: 6px;
         cursor: pointer;
         font-family: 'IBM Plex Mono', monospace;
         font-size: 10px;
         letter-spacing: 0.08em;
         color: var(--text-dim);
         text-transform: uppercase;
         transition: border-color 0.2s, color 0.2s, background 0.2s;
         user-select: none;
         white-space: nowrap;
         }
         .ctrl-btn:hover { border-color: var(--border-light); color: var(--text); }
         .ctrl-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(74,158,255,0.08); }
         .ctrl-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
         /* view toggle group */
         .view-toggle { display: flex; gap: 4px; }
         .view-btn {
         background: var(--surface);
         border: 1px solid var(--border);
         border-radius: 7px;
         padding: 7px 10px;
         cursor: pointer;
         color: var(--text-dim);
         transition: all 0.2s;
         display: flex; align-items: center; justify-content: center;
         }
         .view-btn:hover { border-color: var(--border-light); color: var(--text); }
         .view-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(74,158,255,0.08); }
         .view-btn svg { width: 14px; height: 14px; }
         /* theme toggle */
         .theme-toggle {
         background: var(--surface);
         border: 1px solid var(--border);
         border-radius: 20px;
         padding: 6px 12px 6px 8px;
         display: flex; align-items: center; gap: 7px;
         cursor: pointer;
         font-family: 'IBM Plex Mono', monospace;
         font-size: 10px;
         letter-spacing: 0.08em;
         color: var(--text-dim);
         text-transform: uppercase;
         transition: border-color 0.2s, color 0.2s;
         user-select: none;
         }
         .theme-toggle:hover { border-color: var(--border-light); color: var(--text); }
         .toggle-track { width: 28px; height: 16px; border-radius: 8px; background: var(--border-light); position: relative; transition: background 0.25s; flex-shrink: 0; }
         :root.light .toggle-track { background: var(--accent); }
         .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: var(--text-dim); transition: transform 0.25s, background 0.25s; }
         :root.light .toggle-thumb { transform: translateX(12px); background: #fff; }
         /* ── STATS ── */
         .stats {
         max-width: 1200px;
         margin: 0 auto 28px;
         display: flex;
         gap: 10px;
         flex-wrap: wrap;
         }
         .stat-card {
         flex: 1;
         min-width: 120px;
         background: var(--surface);
         border: 1px solid var(--border);
         border-radius: 8px;
         padding: 14px 18px;
         display: flex; align-items: center; gap: 12px;
         transition: background 0.25s, border-color 0.25s;
         }
         :root.light .stat-card { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
         .stat-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
         .stat-dot.standby { background: var(--standby); box-shadow: 0 0 7px var(--standby); }
         .stat-dot.onrun { background: var(--onrun); box-shadow: 0 0 7px var(--onrun); }
         .stat-dot.longterm { background: var(--longterm); }
         .stat-dot.total { background: var(--accent); }
         .stat-num { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; line-height: 1; }
         .stat-num.standby { color: var(--standby); }
         .stat-num.onrun { color: var(--onrun); }
         .stat-num.longterm { color: var(--longterm); }
         .stat-num.total { color: var(--accent); }
         .stat-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }
         /* ── SECTION LABEL ── */
         .section-label {
         max-width: 1200px;
         margin: 0 auto 12px;
         font-size: 10px;
         color: var(--text-muted);
         text-transform: uppercase;
         letter-spacing: 0.15em;
         display: flex; align-items: center; gap: 10px;
         }
         .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
         /* ── GRID ── */
         .fleet-wrap { max-width: 1200px; margin: 0 auto; }
         .fleet-grid {
         display: grid;
         grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
         gap: 10px;
         }
         .fleet-grid.row-view {
         grid-template-columns: 1fr;
         }
         /* ── CARD ── */
         .card {
         background: var(--surface);
         border: 1px solid var(--border);
         border-radius: 10px;
         padding: 0;
         position: relative;
         overflow: hidden;
         transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
         user-select: none;
         }
         :root.light .card { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
         .card-accent-bar {
         position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
         border-radius: 10px 0 0 10px;
         }
         .card.s-standby .card-accent-bar { background: var(--standby); }
         .card.s-onrun .card-accent-bar { background: var(--onrun); }
         .card.s-longterm .card-accent-bar { background: var(--longterm); }
         .card.s-nil .card-accent-bar { background: var(--nil); }
         .card.s-standby { border-color: rgba(0,229,160,0.2); }
         .card.s-onrun { border-color: rgba(255,107,53,0.22); }
         .card.s-longterm { border-color: rgba(167,139,250,0.25); }
         .card.s-nil { opacity: 0.4; }
         .card:not(.s-nil):hover { transform: translateY(-1px); }
         .card.s-standby:hover { border-color: rgba(0,229,160,0.4); background: var(--standby-dim); }
         .card.s-onrun:hover { border-color: rgba(255,107,53,0.4); background: var(--onrun-dim); }
         .card.s-longterm:hover { border-color: rgba(167,139,250,0.4); background: var(--longterm-dim); }
         /* card body */
         .card-body {
         padding: 14px 16px 14px 20px;
         display: flex;
         align-items: flex-start;
         gap: 12px;
         }
         .card-icon {
         width: 38px; height: 38px; border-radius: 8px;
         display: flex; align-items: center; justify-content: center;
         font-size: 18px; flex-shrink: 0;
         }
         .card.s-standby .card-icon { background: var(--standby-dim); }
         .card.s-onrun .card-icon { background: var(--onrun-dim); }
         .card.s-longterm .card-icon { background: var(--longterm-dim); }
         .card.s-nil .card-icon { background: var(--border); }
         .card-main { flex: 1; min-width: 0; }
         .card-vehicle {
         font-family: 'Syne', sans-serif;
         font-size: 13px; font-weight: 700;
         color: var(--text); letter-spacing: 0.02em;
         white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
         }
         .card-reg {
         font-size: 11px; font-weight: 500; letter-spacing: 0.12em; margin-top: 2px;
         }
         .card.s-standby .card-reg { color: var(--standby); }
         .card.s-onrun .card-reg { color: var(--onrun); }
         .card.s-longterm .card-reg { color: var(--longterm); }
         .card.s-nil .card-reg { color: var(--nil-text); }
         .card-loc-row {
         display: flex; align-items: center; gap: 5px; margin-top: 5px;
         }
         .card-loc {
         font-size: 10px; color: var(--text-dim); letter-spacing: 0.05em;
         cursor: pointer; border-bottom: 1px dashed transparent;
         transition: border-color 0.15s, color 0.15s;
         }
         .card-loc:hover { color: var(--text); border-color: var(--text-dim); }
         .loc-edit-icon { font-size: 9px; color: var(--text-muted); cursor: pointer; opacity: 0; transition: opacity 0.15s; }
         .card-loc-row:hover .loc-edit-icon { opacity: 1; }
         .loc-input {
         font-family: 'IBM Plex Mono', monospace;
         font-size: 10px;
         background: var(--surface2);
         border: 1px solid var(--border-light);
         border-radius: 4px;
         color: var(--text);
         padding: 2px 6px;
         letter-spacing: 0.05em;
         outline: none;
         width: 140px;
         display: none;
         }
         .loc-input:focus { border-color: var(--accent); }
         .card-remarks {
         font-size: 10px; color: var(--text-dim); margin-top: 4px;
         font-style: italic; letter-spacing: 0.02em;
         white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
         }
         /* card right side */
         .card-right { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
         .status-badge {
         font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
         text-transform: uppercase; padding: 3px 8px; border-radius: 4px; white-space: nowrap;
         }
         .card.s-standby .status-badge { color: var(--standby); background: var(--standby-dim); }
         .card.s-onrun .status-badge { color: var(--onrun); background: var(--onrun-dim); animation: pulse 2s ease-in-out infinite; }
         .card.s-longterm .status-badge { color: var(--longterm); background: var(--longterm-dim); }
         .card.s-nil .status-badge { color: var(--nil-text); background: var(--border); }
         .since-label { font-size: 9px; color: var(--text-muted); letter-spacing: 0.04em; }
         /* ── CARD FOOTER (actions) ── */
         .card-footer {
         border-top: 1px solid var(--border);
         padding: 8px 16px 8px 20px;
         display: flex;
         align-items: center;
         gap: 6px;
         background: var(--surface2);
         }
         .act-btn {
         font-family: 'IBM Plex Mono', monospace;
         font-size: 9px;
         letter-spacing: 0.08em;
         text-transform: uppercase;
         padding: 4px 9px;
         border-radius: 5px;
         border: 1px solid var(--border);
         background: transparent;
         color: var(--text-dim);
         cursor: pointer;
         transition: all 0.15s;
         white-space: nowrap;
         }
         .act-btn:hover { border-color: var(--border-light); color: var(--text); }
         .act-btn.primary { border-color: var(--standby); color: var(--standby); }
         .act-btn.primary:hover { background: var(--standby-dim); }
         .act-btn.danger { border-color: var(--onrun); color: var(--onrun); }
         .act-btn.danger:hover { background: var(--onrun-dim); }
         .act-btn.log-btn { margin-left: auto; color: var(--text-muted); }
         .act-btn.log-btn:hover { color: var(--text-dim); }
         /* ── STATUS DROPDOWN ── */
         .status-dropdown {
         position: absolute;
         top: 100%; right: 0;
         background: var(--surface);
         border: 1px solid var(--border-light);
         border-radius: 8px;
         padding: 6px;
         z-index: 200;
         min-width: 200px;
         box-shadow: 0 8px 24px rgba(0,0,0,0.4);
         display: none;
         }
         :root.light .status-dropdown { box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
         .status-dropdown.open { display: block; }
         .sd-item {
         display: flex; align-items: center; gap: 8px;
         padding: 7px 10px;
         border-radius: 5px;
         cursor: pointer;
         font-size: 10px;
         letter-spacing: 0.07em;
         text-transform: uppercase;
         color: var(--text-dim);
         transition: background 0.15s, color 0.15s;
         }
         .sd-item:hover { background: var(--border); color: var(--text); }
         .sd-item.active { color: var(--text); background: var(--border); }
         .sd-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
         .sd-divider { height: 1px; background: var(--border); margin: 4px 0; }
         .sd-custom-input {
         font-family: 'IBM Plex Mono', monospace;
         font-size: 10px;
         width: 100%;
         padding: 6px 8px;
         background: var(--surface2);
         border: 1px solid var(--border-light);
         border-radius: 5px;
         color: var(--text);
         outline: none;
         margin-top: 2px;
         letter-spacing: 0.04em;
         }
         .sd-custom-input:focus { border-color: var(--accent); }
         .sd-custom-row { padding: 4px 4px 2px; }
         .sd-custom-hint { font-size: 9px; color: var(--text-muted); padding: 3px 4px 0; letter-spacing: 0.06em; }
         /* ── AUDIT LOG PANEL ── */
         .log-panel-overlay {
         position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300;
         display: flex; align-items: center; justify-content: center;
         opacity: 0; pointer-events: none; transition: opacity 0.2s;
         }
         .log-panel-overlay.open { opacity: 1; pointer-events: all; }
         :root.light .log-panel-overlay { background: rgba(0,0,0,0.3); }
         .log-panel {
         background: var(--surface);
         border: 1px solid var(--border-light);
         border-radius: 14px;
         width: 560px; max-width: calc(100vw - 32px);
         max-height: 80vh;
         display: flex; flex-direction: column;
         transform: translateY(12px); transition: transform 0.2s;
         overflow: hidden;
         }
         .log-panel-overlay.open .log-panel { transform: translateY(0); }
         .log-header {
         padding: 18px 20px 14px;
         border-bottom: 1px solid var(--border);
         display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
         }
         .log-header-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
         .log-header-sub { font-size: 10px; color: var(--text-dim); margin-top: 2px; letter-spacing: 0.05em; }
         .log-close {
         background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
         color: var(--text-dim); cursor: pointer; padding: 5px 10px;
         font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.06em;
         text-transform: uppercase; transition: all 0.15s; flex-shrink: 0;
         }
         .log-close:hover { color: var(--text); border-color: var(--border-light); }
         .log-body { overflow-y: auto; padding: 14px 20px 20px; flex: 1; }
         .log-entry {
         display: flex; gap: 12px; padding: 10px 0;
         border-bottom: 1px solid var(--border);
         }
         .log-entry:last-child { border-bottom: none; }
         .log-time { font-size: 10px; color: var(--text-muted); letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0; min-width: 90px; padding-top: 1px; }
         .log-dot-col { display: flex; flex-direction: column; align-items: center; gap: 0; flex-shrink: 0; padding-top: 4px; }
         .log-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
         .log-line { flex: 1; width: 1px; background: var(--border); margin-top: 3px; }
         .log-content { flex: 1; }
         .log-action { font-size: 11px; color: var(--text); font-weight: 500; }
         .log-detail { font-size: 10px; color: var(--text-dim); margin-top: 2px; letter-spacing: 0.03em; }
         .log-empty { font-size: 11px; color: var(--text-muted); text-align: center; padding: 24px 0; letter-spacing: 0.06em; }
         /* all-logs panel */
         .all-log-panel {
         background: var(--surface);
         border: 1px solid var(--border-light);
         border-radius: 14px;
         width: 700px; max-width: calc(100vw - 32px);
         max-height: 85vh;
         display: flex; flex-direction: column;
         transform: translateY(12px); transition: transform 0.2s;
         overflow: hidden;
         }
         .log-panel-overlay.open .all-log-panel { transform: translateY(0); }
         .log-filter-row {
         padding: 10px 20px;
         border-bottom: 1px solid var(--border);
         display: flex; gap: 6px; flex-wrap: wrap;
         }
         .log-filter-btn {
         font-family: 'IBM Plex Mono', monospace; font-size: 9px;
         letter-spacing: 0.08em; text-transform: uppercase;
         padding: 4px 9px; border-radius: 5px; border: 1px solid var(--border);
         background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.15s;
         }
         .log-filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(74,158,255,0.08); }
         .log-filter-btn:hover { border-color: var(--border-light); color: var(--text); }
         /* ── ANIMATIONS ── */
         @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }
         @keyframes fadeIn { from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none} }
         .card { animation: fadeIn 0.2s ease; }
         /* ── HINT ── */
         .hint {
         max-width: 1200px;
         margin: 24px auto 0;
         font-size: 10px;
         color: var(--text-muted);
         letter-spacing: 0.07em;
         text-align: center;
         }
         @media (max-width: 640px) {
         header { flex-wrap: wrap; }
         .header-right { flex-wrap: wrap; }
         .stats { flex-wrap: wrap; }
         .stat-card { min-width: calc(50% - 5px); flex: none; }
         .fleet-grid { grid-template-columns: 1fr; }
         }
      </style>
   </head>
   <body>
      <!-- HEADER -->
      <header>
         <div class="header-left">
            <h1>FLEET STATUS</h1>
            <p>Vehicle Key Management Board</p>
         </div>
         <div class="header-right">
            <div class="clock">
               <span id="time">--:--:--</span>
               <span id="date">--- -- ----</span>
            </div>
            <!-- view toggle -->
            <div class="view-toggle">
               <button class="view-btn active" id="btn-grid" onclick="setView('grid')" title="Grid view">
                  <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
                     <rect x="1" y="1" width="5" height="5" rx="1"/>
                     <rect x="8" y="1" width="5" height="5" rx="1"/>
                     <rect x="1" y="8" width="5" height="5" rx="1"/>
                     <rect x="8" y="8" width="5" height="5" rx="1"/>
                  </svg>
               </button>
               <button class="view-btn" id="btn-row" onclick="setView('row')" title="Row view">
                  <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
                     <line x1="1" y1="3" x2="13" y2="3"/>
                     <line x1="1" y1="7" x2="13" y2="7"/>
                     <line x1="1" y1="11" x2="13" y2="11"/>
                  </svg>
               </button>
            </div>
            <!-- all logs -->
            <button class="ctrl-btn" onclick="openAllLogs()">
               <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="2" y="1" width="10" height="12" rx="1.5"/>
                  <line x1="4.5" y1="4.5" x2="9.5" y2="4.5"/>
                  <line x1="4.5" y1="7" x2="9.5" y2="7"/>
                  <line x1="4.5" y1="9.5" x2="7.5" y2="9.5"/>
               </svg>
               Audit Log
            </button>
            <!-- theme -->
            <button class="theme-toggle" onclick="toggleTheme()">
               <div class="toggle-track">
                  <div class="toggle-thumb"></div>
               </div>
               <span id="theme-label">LIGHT</span>
            </button>
         </div>
      </header>
      <!-- STATS -->
      <div class="stats">
         <div class="stat-card">
            <div class="stat-dot standby"></div>
            <div>
               <div class="stat-num standby" id="cnt-standby">0</div>
               <div class="stat-label">Standby</div>
            </div>
         </div>
         <div class="stat-card">
            <div class="stat-dot onrun"></div>
            <div>
               <div class="stat-num onrun" id="cnt-onrun">0</div>
               <div class="stat-label">On-Run</div>
            </div>
         </div>
         <div class="stat-card">
            <div class="stat-dot longterm"></div>
            <div>
               <div class="stat-num longterm" id="cnt-longterm">0</div>
               <div class="stat-label">Long-Term</div>
            </div>
         </div>
         <div class="stat-card">
            <div class="stat-dot total"></div>
            <div>
               <div class="stat-num total" id="cnt-total">0</div>
               <div class="stat-label">Total Active</div>
            </div>
         </div>
      </div>
      <!-- ACTIVE FLEET -->
      <div class="section-label">Active Fleet</div>
      <div class="fleet-wrap">
         <div class="fleet-grid" id="grid-active"></div>
      </div>
      <!-- UNAVAILABLE -->
      <div class="section-label" style="margin-top:28px;">Unavailable</div>
      <div class="fleet-wrap">
         <div class="fleet-grid" id="grid-nil"></div>
      </div>
      <div class="hint">CLICK A CARD ACTION TO CHANGE STATUS &nbsp;·&nbsp; CLICK LOCATION TO EDIT &nbsp;·&nbsp; ··· FOR STATUS OPTIONS</div>
      <!-- LOG PANEL OVERLAY -->
      <div class="log-panel-overlay" id="log-overlay" onclick="closeLog(event)">
         <div class="log-panel" id="log-panel">
            <div class="log-header">
               <div>
                  <div class="log-header-title" id="log-title">Audit Log</div>
                  <div class="log-header-sub" id="log-sub">—</div>
               </div>
               <button class="log-close" onclick="closeLogDirect()">Close</button>
            </div>
            <div class="log-body" id="log-body"></div>
         </div>
      </div>
      <!-- ALL LOGS OVERLAY -->
      <div class="log-panel-overlay" id="alllog-overlay" onclick="closeAllLog(event)">
         <div class="all-log-panel" id="alllog-panel">
            <div class="log-header">
               <div>
                  <div class="log-header-title">Fleet Audit Log</div>
                  <div class="log-header-sub">All status changes across the fleet</div>
               </div>
               <button class="log-close" onclick="closeAllLogDirect()">Close</button>
            </div>
            <div class="log-filter-row" id="alllog-filters"></div>
            <div class="log-body" id="alllog-body"></div>
         </div>
      </div>
      <script>
         // ── DATA ──────────────────────────────────────────────
         
         const LONG_TERM_STATUSES = [
         
           { key: 'servicing',   label: 'Servicing',           color: '#f59e0b' },
         
           { key: 'workshop',    label: 'Workshop',             color: '#ef4444' },
         
           { key: 'lowmanpower', label: 'Off-Run (Low Manpower)', color: '#8b5cf6' },
         
           { key: 'onloan',      label: 'On Loan',              color: '#06b6d4' },
         
           { key: 'offroad',     label: 'Off-Road (Fault)',     color: '#f97316' },
         
           { key: 'deferred',    label: 'Deferred Use',         color: '#6b7280' },
         
         ];
         
          
         
         const vehicles = [
         
           { id:1,  vehicle:"FCV",            reg:"XE7069X", location:"YARD",        nil:false },
         
           { id:2,  vehicle:"P3 MINI BUS",    reg:"PA9740T", location:"SERVICING",   nil:false },
         
           { id:3,  vehicle:"SUV",            reg:"QX2156T", location:"BASEMENT",    nil:false },
         
           { id:4,  vehicle:"IV",             reg:"QX1167T", location:"BASEMENT",    nil:false },
         
           { id:5,  vehicle:"LORRY (4X4)",    reg:"YP4525X", location:"YARD",        nil:false },
         
           { id:6,  vehicle:"LORRY (4X4)",    reg:"YP4661K", location:"HQ (TFMS)",   nil:false },
         
           { id:7,  vehicle:"LORRY (4X4)",    reg:"YP4727E", location:"STN45",       nil:false },
         
           { id:8,  vehicle:"LORRY CLASS 4",  reg:"YN4422U", location:"YARD",        nil:false },
         
           { id:9,  vehicle:"LORRY CLASS 4",  reg:"YP2975T", location:"YARD",        nil:false },
         
           { id:10, vehicle:"LORRY CLASS 4",  reg:"YN2997E", location:"YARD",        nil:false },
         
           { id:11, vehicle:"CL3 LORRY",      reg:"YN5398A", location:"YARD",        nil:false },
         
           { id:12, vehicle:"LORRY CLASS 3",  reg:"YP3265C", location:"YARD",        nil:false },
         
           { id:13, vehicle:"DOUBLE CAB",     reg:"YN3909P", location:"LOADING BAY", nil:false },
         
           { id:14, vehicle:"DOUBLE CAB",     reg:"YN3912D", location:"LOADING BAY", nil:false },
         
           { id:15, vehicle:"NIL",            reg:"NIL",     location:"NIL",         nil:true  },
         
           { id:16, vehicle:"P3 MINI BUS (2ND)", reg:"PD667R", location:"BASEMENT", nil:false },
         
         ];
         
          
         
         // state per vehicle: { status: 'standby'|'onrun'|'longterm', ltKey, ltLabel, ltCustom, since, location }
         
         const state = {};
         
         const auditLog = []; // { ts, id, fromStatus, fromLabel, toStatus, toLabel, vehicle, reg }
         
          
         
         vehicles.forEach(v => {
         
           state[v.id] = {
         
             status: 'standby',
         
             ltKey: null, ltLabel: null,
         
             since: Date.now(),
         
             location: v.location,
         
             remarks: ''
         
           };
         
         });
         
          
         
         let viewMode = 'grid';
         
         let openDropdownId = null;
         
          
         
         // ── HELPERS ──────────────────────────────────────────
         
         function getIcon(v) {
         
           const u = v.toUpperCase();
         
           if (u.includes("BUS")) return "🚌";
         
           if (u.includes("LORRY") || u.includes("CL3")) return "🚛";
         
           if (u.includes("SUV")) return "🚙";
         
           if (u.includes("CAB")) return "🛻";
         
           if (u.includes("FCV")) return "🚒";
         
           if (u.includes("IV")) return "🚐";
         
           return "🚗";
         
         }
         
          
         
         function fmtTime(ts) {
         
           const d = new Date(ts);
         
           return d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
         
         }
         
         function fmtDateTime(ts) {
         
           const d = new Date(ts);
         
           return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
         
             + ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
         
         }
         
         function timeSince(ts) {
         
           const s = Math.floor((Date.now() - ts) / 1000);
         
           if (s < 60) return `${s}s`;
         
           if (s < 3600) return `${Math.floor(s/60)}m`;
         
           if (s < 86400) return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
         
           return `${Math.floor(s/86400)}d`;
         
         }
         
          
         
         function getStatusLabel(st) {
         
           if (st.status === 'standby') return 'STANDBY';
         
           if (st.status === 'onrun') return 'ON-RUN';
         
           if (st.status === 'longterm') return st.ltLabel || st.ltKey || 'LONG-TERM';
         
           return '—';
         
         }
         
         function getLtColor(ltKey) {
         
           const found = LONG_TERM_STATUSES.find(s => s.key === ltKey);
         
           return found ? found.color : 'var(--custom)';
         
         }
         
          
         
         function logChange(id, fromStatus, fromLabel, toStatus, toLabel) {
         
           const v = vehicles.find(x => x.id === id);
         
           auditLog.unshift({
         
             ts: Date.now(), id,
         
             fromStatus, fromLabel,
         
             toStatus, toLabel,
         
             vehicle: v.vehicle, reg: v.reg
         
           });
         
         }
         
          
         
         // ── STATUS CHANGE ─────────────────────────────────────
         
         function setStatus(id, newStatus, ltKey, ltLabel) {
         
           const st = state[id];
         
           const oldLabel = getStatusLabel(st);
         
           const oldStatus = st.status;
         
           st.status = newStatus;
         
           st.ltKey = ltKey || null;
         
           st.ltLabel = ltLabel || null;
         
           st.since = Date.now();
         
           const newLabel = getStatusLabel(st);
         
           logChange(id, oldStatus, oldLabel, newStatus, newLabel);
         
           closeDropdown();
         
           renderAll();
         
         }
         
          
         
         // ── RENDER ────────────────────────────────────────────
         
         function renderAll() {
         
           renderGrid();
         
           renderStats();
         
         }
         
          
         
         function renderStats() {
         
           let standby=0, onrun=0, longterm=0;
         
           vehicles.forEach(v => {
         
             if (v.nil) return;
         
             const st = state[v.id];
         
             if (st.status === 'standby') standby++;
         
             else if (st.status === 'onrun') onrun++;
         
             else if (st.status === 'longterm') longterm++;
         
           });
         
           document.getElementById('cnt-standby').textContent = standby;
         
           document.getElementById('cnt-onrun').textContent = onrun;
         
           document.getElementById('cnt-longterm').textContent = longterm;
         
           document.getElementById('cnt-total').textContent = standby + onrun + longterm;
         
         }
         
          
         
         function renderGrid() {
         
           const ga = document.getElementById('grid-active');
         
           const gn = document.getElementById('grid-nil');
         
           ga.innerHTML = ''; gn.innerHTML = '';
         
          
         
           const isRow = viewMode === 'row';
         
           ga.className = 'fleet-grid' + (isRow ? ' row-view' : '');
         
           gn.className = 'fleet-grid' + (isRow ? ' row-view' : '');
         
          
         
           vehicles.forEach(v => {
         
             const card = buildCard(v);
         
             if (v.nil) gn.appendChild(card);
         
             else ga.appendChild(card);
         
           });
         
         }
         
          
         
         function buildCard(v) {
         
           const st = state[v.id];
         
           const isNil = v.nil;
         
           const sClass = isNil ? 's-nil' : `s-${st.status}`;
         
          
         
           const card = document.createElement('div');
         
           card.className = `card ${sClass}`;
         
           card.id = `card-${v.id}`;
         
          
         
           // status badge text / color
         
           let badgeText = isNil ? 'N/A' : getStatusLabel(st);
         
           let badgeStyle = '';
         
           if (!isNil && st.status === 'longterm' && st.ltKey) {
         
             const c = getLtColor(st.ltKey);
         
             badgeStyle = `style="color:${c};background:${c}22;"`;
         
           }
         
          
         
           // remarks line
         
           const remarksHtml = st.remarks
         
             ? `<div class="card-remarks" title="${st.remarks}">📎 ${st.remarks}</div>`
         
             : '';
         
          
         
           // since
         
           const sinceHtml = !isNil
         
             ? `<div class="since-label">${timeSince(st.since)} ago</div>`
         
             : '';
         
          
         
           // action buttons in footer
         
           let footerHtml = '';
         
           if (!isNil) {
         
             const isPrimary = st.status !== 'standby';
         
             const isDanger = st.status !== 'onrun';
         
             footerHtml = `
         
               <div class="card-footer">
         
                 ${isPrimary ? `<button class="act-btn primary" onclick="setStatus(${v.id},'standby')">✓ Standby</button>` : `<button class="act-btn" disabled style="opacity:0.3;cursor:default">✓ Standby</button>`}
         
                 ${isDanger ? `<button class="act-btn danger" onclick="setStatus(${v.id},'onrun')">▶ On-Run</button>` : `<button class="act-btn" disabled style="opacity:0.3;cursor:default">▶ On-Run</button>`}
         
                 <div style="position:relative;margin-left:auto;display:flex;gap:6px;">
         
                   <button class="act-btn" onclick="openDropdown(event,${v.id})" title="Long-term status">··· Long-Term</button>
         
                 </div>
         
                 <button class="act-btn log-btn" onclick="openLog(${v.id})" title="View log">📋</button>
         
               </div>`;
         
           }
         
          
         
           card.innerHTML = `
         
             <div class="card-accent-bar"></div>
         
             <div class="card-body">
         
               <div class="card-icon">${isNil ? '⊘' : getIcon(v.vehicle)}</div>
         
               <div class="card-main">
         
                 <div class="card-vehicle">${v.vehicle}</div>
         
                 <div class="card-reg">${v.reg}</div>
         
                 <div class="card-loc-row">
         
                   <span class="card-loc" id="loc-text-${v.id}" onclick="editLoc(${v.id})">${st.location}</span>
         
                   <span class="loc-edit-icon" onclick="editLoc(${v.id})">✎</span>
         
                   <input class="loc-input" id="loc-input-${v.id}" value="${st.location}"
         
                     onblur="saveLoc(${v.id})" onkeydown="locKey(event,${v.id})">
         
                 </div>
         
                 ${remarksHtml}
         
               </div>
         
               <div class="card-right">
         
                 <div class="status-badge" ${badgeStyle}>${badgeText}</div>
         
                 ${sinceHtml}
         
               </div>
         
             </div>
         
             ${footerHtml}
         
           `;
         
          
         
           return card;
         
         }
         
          
         
         // ── DROPDOWN ──────────────────────────────────────────
         
         function openDropdown(e, id) {
         
           e.stopPropagation();
         
           closeDropdown();
         
           openDropdownId = id;
         
           const st = state[id];
         
          
         
           const dd = document.createElement('div');
         
           dd.className = 'status-dropdown open';
         
           dd.id = 'dd-' + id;
         
          
         
           let html = '';
         
           LONG_TERM_STATUSES.forEach(s => {
         
             const isActive = st.status === 'longterm' && st.ltKey === s.key;
         
             html += `<div class="sd-item ${isActive?'active':''}" onclick="setStatus(${id},'longterm','${s.key}','${s.label}')">
         
               <div class="sd-dot" style="background:${s.color}"></div>${s.label}
         
             </div>`;
         
           });
         
          
         
           html += `<div class="sd-divider"></div>
         
             <div class="sd-custom-hint">Custom remark / niche status</div>
         
             <div class="sd-custom-row">
         
               <input class="sd-custom-input" id="dd-custom-${id}" placeholder="e.g. Awaiting parts…" value="${st.status==='longterm'&&!st.ltKey ? st.ltLabel||'' : ''}">
         
             </div>
         
             <div style="padding:4px 4px 2px;display:flex;gap:6px;">
         
               <button class="act-btn" style="font-size:9px;" onclick="setCustomStatus(${id})">Apply Custom</button>
         
               <button class="act-btn" style="font-size:9px;" onclick="editRemarks(${id})">Edit Remarks</button>
         
             </div>`;
         
          
         
           dd.innerHTML = html;
         
          
         
           const btn = e.currentTarget;
         
           btn.parentElement.appendChild(dd);
         
         }
         
          
         
         function closeDropdown() {
         
           document.querySelectorAll('.status-dropdown').forEach(d => d.remove());
         
           openDropdownId = null;
         
         }
         
          
         
         document.addEventListener('click', (e) => {
         
           if (!e.target.closest('.status-dropdown') && !e.target.closest('.act-btn')) {
         
             closeDropdown();
         
           }
         
         });
         
          
         
         function setCustomStatus(id) {
         
           const val = (document.getElementById('dd-custom-' + id)?.value || '').trim();
         
           if (!val) return;
         
           setStatus(id, 'longterm', null, val);
         
         }
         
          
         
         function editRemarks(id) {
         
           const v = vehicles.find(x => x.id === id);
         
           const cur = state[id].remarks || '';
         
           const val = prompt(`Remarks for ${v.vehicle} (${v.reg}):`, cur);
         
           if (val === null) return;
         
           state[id].remarks = val.trim();
         
           closeDropdown();
         
           renderAll();
         
         }
         
          
         
         // ── LOCATION EDIT ─────────────────────────────────────
         
         function editLoc(id) {
         
           const txt = document.getElementById('loc-text-' + id);
         
           const inp = document.getElementById('loc-input-' + id);
         
           if (!txt || !inp) return;
         
           txt.style.display = 'none';
         
           inp.style.display = 'inline-block';
         
           inp.focus(); inp.select();
         
         }
         
         function saveLoc(id) {
         
           const txt = document.getElementById('loc-text-' + id);
         
           const inp = document.getElementById('loc-input-' + id);
         
           if (!txt || !inp) return;
         
           const val = inp.value.trim() || state[id].location;
         
           state[id].location = val;
         
           vehicles.find(v => v.id === id).location = val;
         
           txt.textContent = val;
         
           txt.style.display = '';
         
           inp.style.display = 'none';
         
         }
         
         function locKey(e, id) {
         
           if (e.key === 'Enter') saveLoc(id);
         
           if (e.key === 'Escape') {
         
             const txt = document.getElementById('loc-text-' + id);
         
             const inp = document.getElementById('loc-input-' + id);
         
             inp.value = state[id].location;
         
             txt.style.display = '';
         
             inp.style.display = 'none';
         
           }
         
         }
         
          
         
         // ── AUDIT LOG ─────────────────────────────────────────
         
         function openLog(id) {
         
           const v = vehicles.find(x => x.id === id);
         
           document.getElementById('log-title').textContent = `${v.vehicle} — ${v.reg}`;
         
           document.getElementById('log-sub').textContent = 'Individual vehicle audit log';
         
           const entries = auditLog.filter(e => e.id === id);
         
           renderLogEntries(entries, 'log-body');
         
           document.getElementById('log-overlay').classList.add('open');
         
         }
         
          
         
         function openAllLogs() {
         
           renderAllLogFilters();
         
           renderAllLogEntries('all');
         
           document.getElementById('alllog-overlay').classList.add('open');
         
         }
         
          
         
         let allLogFilter = 'all';
         
         function renderAllLogFilters() {
         
           const vehicles_used = [...new Set(auditLog.map(e => e.id))];
         
           const row = document.getElementById('alllog-filters');
         
           row.innerHTML = '';
         
           const makeBtn = (key, label) => {
         
             const b = document.createElement('button');
         
             b.className = 'log-filter-btn' + (allLogFilter === key ? ' active' : '');
         
             b.textContent = label;
         
             b.onclick = () => { allLogFilter = key; renderAllLogFilters(); renderAllLogEntries(key); };
         
             row.appendChild(b);
         
           };
         
           makeBtn('all', 'All Vehicles');
         
           vehicles.filter(v => !v.nil && vehicles_used.includes(v.id)).forEach(v => {
         
             makeBtn(String(v.id), v.reg);
         
           });
         
         }
         
          
         
         function renderAllLogEntries(filter) {
         
           const entries = filter === 'all' ? auditLog : auditLog.filter(e => String(e.id) === filter);
         
           renderLogEntries(entries, 'alllog-body', true);
         
         }
         
          
         
         function renderLogEntries(entries, bodyId, showVehicle = false) {
         
           const body = document.getElementById(bodyId);
         
           if (!entries.length) {
         
             body.innerHTML = '<div class="log-empty">NO LOG ENTRIES YET</div>';
         
             return;
         
           }
         
           body.innerHTML = entries.map((e, i) => {
         
             const toColor = e.toStatus === 'standby' ? 'var(--standby)'
         
               : e.toStatus === 'onrun' ? 'var(--onrun)'
         
               : e.toStatus === 'longterm' ? 'var(--longterm)'
         
               : 'var(--nil-text)';
         
             const showLine = i < entries.length - 1;
         
             return `<div class="log-entry">
         
               <div class="log-time">${fmtDateTime(e.ts)}</div>
         
               <div class="log-dot-col">
         
                 <div class="log-dot" style="background:${toColor}"></div>
         
                 ${showLine ? '<div class="log-line"></div>' : ''}
         
               </div>
         
               <div class="log-content">
         
                 <div class="log-action">${showVehicle ? `<b>${e.vehicle}</b> · ` : ''}${e.fromLabel} → <span style="color:${toColor}">${e.toLabel}</span></div>
         
                 ${showVehicle ? `<div class="log-detail">${e.reg}</div>` : ''}
         
               </div>
         
             </div>`;
         
           }).join('');
         
         }
         
          
         
         function closeLog(e) {
         
           if (e.target === document.getElementById('log-overlay')) closeLogDirect();
         
         }
         
         function closeLogDirect() {
         
           document.getElementById('log-overlay').classList.remove('open');
         
         }
         
         function closeAllLog(e) {
         
           if (e.target === document.getElementById('alllog-overlay')) closeAllLogDirect();
         
         }
         
         function closeAllLogDirect() {
         
           document.getElementById('alllog-overlay').classList.remove('open');
         
         }
         
          
         
         // ── VIEW TOGGLE ───────────────────────────────────────
         
         function setView(mode) {
         
           viewMode = mode;
         
           document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
         
           document.getElementById('btn-row').classList.toggle('active', mode === 'row');
         
           renderAll();
         
         }
         
          
         
         // ── THEME ─────────────────────────────────────────────
         
         function toggleTheme() {
         
           const isLight = document.documentElement.classList.toggle("light");
         
           document.getElementById("theme-label").textContent = isLight ? "DARK" : "LIGHT";
         
         }
         
          
         
         // ── CLOCK ─────────────────────────────────────────────
         
         function updateClock() {
         
           const now = new Date();
         
           document.getElementById("time").textContent = now.toTimeString().slice(0, 8);
         
           document.getElementById("date").textContent =
         
             now.toLocaleDateString("en-GB", { weekday:"short", day:"2-digit", month:"short", year:"numeric" }).toUpperCase();
         
           // refresh "since" labels
         
           document.querySelectorAll('.since-label').forEach(el => {
         
             const card = el.closest('.card');
         
             if (card) {
         
               const id = parseInt(card.id.replace('card-',''));
         
               if (state[id]) el.textContent = timeSince(state[id].since) + ' ago';
         
             }
         
           });
         
         }
         
          
         
         // ── INIT ──────────────────────────────────────────────
         
         renderAll();
         
         updateClock();
         
         setInterval(updateClock, 10000);
         
      </script>
   </body>
</html>
